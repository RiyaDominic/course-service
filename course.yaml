
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-2048-riya
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-2048-riya
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-2048-riya
    spec:
      containers:
      - image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/course_riya:latest
        imagePullPolicy: Always
        name: app-2048-riya
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-2048-riya
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: app-2048-riya
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-2048-riya
  annotations:
    alb.ingress.kubernetes.io/group.name: student-app
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /riya-course
          pathType: Prefix
          backend:
            service:
              name: service-2048-riya
              port:
                number: 3001
